# Template for static hosting using S3 bucket and CloudFront + Waf Global + Shield Advanced (requires Subscription)

# Original template from https://blog.canopas.com/deploy-a-website-with-aws-s3-cloudfront-using-cloudformation-c2199dc6c435
# 
# References AWS Shield Advanced:
#  
# https://github.com/aws-samples/aws-shield-advanced-examples/tree/main
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-resource-shield-protection.html#aws-resource-shield-protection--examples
# https://github.com/aws-samples/aws-shield-advanced-one-click-deployment/tree/main
# 
# REQUIRED: Subscribe to AWS Shield Advanced https://docs.aws.amazon.com/waf/latest/developerguide/enable-ddos-prem.html
# Otherwise, you will get error message: Resource handler returned message: "The subscription does not exist. (Service: Shield, Status Code: 400, HandlerErrorCode: NotFound)
#
# Simplify subscriptions with AWS Firewall Manager https://docs.aws.amazon.com/waf/latest/developerguide/getting-started-fms-shield.html
#
